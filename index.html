<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For My Love ❤️</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
text-align:center;
overflow:hidden;
}
.card{
background:rgba(255,255,255,.15);
padding:30px;
border-radius:20px;
backdrop-filter:blur(10px);
width:85%;
max-width:400px;
}
img{
width:200px;
height:200px;
border-radius:20px;
object-fit:cover;
margin-bottom:20px;
}
button{
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
button:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="card">
<img src="https://picsum.photos/300" alt="photo">

<h1>I'm Sorry ❤️</h1>

<p>
Agar maine tumhe hurt kiya hai...
to dil se Sorry. 🥺
</p>

<p>
Tum meri smile ho,
meri happiness ho,
aur main sirf tumhe phir se haste hue dekhna chahta hoon. 💕
</p>

<button onclick="alert('I Love You Forever ❤️')">
Click Here 💖
</button>

</div>

</body>
</html>
